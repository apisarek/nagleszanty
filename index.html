<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAGLE</title>
    
    <!-- Standard Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Safari Pinned Tab Fix -->
    <link rel="mask-icon" href="favicon.svg" color="#000000">

    <style>
        :root {
            /* Your custom beige background */
            --bg-color: #f3e6d7; 
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Clickable Zones */
        .zone {
            display: flex;
            width: 100%;
            height: 50vh;
            text-decoration: none;
            z-index: 1;
            -webkit-tap-highlight-color: transparent;
        }

        /* Centered Logo */
        .centered-svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 90%;
            max-height: 90%;
            pointer-events: none; /* Clicks pass through to the links */
            z-index: 2;
            user-select: none;
        }
    </style>
</head>
<body>

    <!-- Upper Half Redirect -->
    <a href="https://www.facebook.com/nagleszanty" class="zone" title="Page A"></a>

    <!-- Lower Half Redirect -->
    <a href="https://www.facebook.com/OTHER_PAGE" class="zone" title="Page B"></a>

    <img src="nagle.svg" class="centered-svg" alt="NAGLE Logo">

</body>
</html>
